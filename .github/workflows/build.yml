name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual trigger from GitHub → Actions tab

# Only one release job can run at a time (prevents race conditions)
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── Step 1: build Windows .exe ────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file exe
        run: pyinstaller StudyPoint-release.spec --noconfirm

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/StudyPoint.exe
          retention-days: 1

  # ── Step 2: build Linux bundle ────────────────────────────────────────────
  build-linux:
    name: Build Linux bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux bundle (onedir)
        run: pyinstaller StudyPoint.spec --noconfirm

      - name: Zip Linux bundle
        run: zip -r StudyPoint-linux.zip dist/StudyPoint/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: StudyPoint-linux.zip
          retention-days: 1

  # ── Step 3: publish the "Latest Release" ─────────────────────────────────
  release:
    name: Publish Latest Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./release

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: ./release

      - name: Move latest tag to current commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force

      - name: Build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)"    >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%d %b %Y  %H:%M UTC')" >> "$GITHUB_OUTPUT"
          echo "ref=${GITHUB_REF_NAME}"               >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: false
          make_latest: true
          body: |
            ## StudyPoint – Latest Build

            Automatically built from the newest code on branch `${{ steps.meta.outputs.ref }}`.

            | | |
            |---|---|
            | **Commit** | `${{ steps.meta.outputs.sha }}` |
            | **Built**  | ${{ steps.meta.outputs.date }} |

            ---

            ### How to install (Windows)

            1. Download **`StudyPoint.exe`** below
            2. Double-click to run — no installation needed
            3. The database (`library.db`) is created next to the exe on first launch

            > **Note:** Windows Defender / SmartScreen may show a warning the first time
            > because the exe is not code-signed. Click **"More info → Run anyway"**.

            ### How to install (Linux)

            1. Download **`StudyPoint-linux.zip`**
            2. Extract it: `unzip StudyPoint-linux.zip`
            3. Run: `./dist/StudyPoint/StudyPoint`
          files: |
            release/StudyPoint.exe
            release/StudyPoint-linux.zip
