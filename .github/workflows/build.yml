name: Build Executables

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: StudyPoint-windows
            exe_path: dist/StudyPoint
          - os: ubuntu-latest
            artifact: StudyPoint-linux
            exe_path: dist/StudyPoint

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Linux: install Qt system libs required by PyQt5
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller StudyPoint.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe_path }}
          retention-days: 30

  # ── Attach artefacts to GitHub Release when a release is created ──────────
  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: StudyPoint-windows
          path: StudyPoint-windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: StudyPoint-linux
          path: StudyPoint-linux

      - name: Zip bundles
        run: |
          zip -r StudyPoint-windows.zip StudyPoint-windows/
          zip -r StudyPoint-linux.zip   StudyPoint-linux/

      - name: Attach zips to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            StudyPoint-windows.zip
            StudyPoint-linux.zip
